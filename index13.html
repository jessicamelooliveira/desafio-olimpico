<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Quest - PIC Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #87CEEB;
            --grass-green: #7cfc00;
            --button-blue: #29adff;
            --panel-bg: #fffcf0;
            --border-color: #444;
            --gold: #ffd700;
            --danger: #ff4444;
        }

        /* Ajuste base para não precisar de scroll no desktop */
        body {
            background-color: var(--sky-blue);
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            color: #333;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 3.5rem); /* Fonte diminui no mobile */
            color: white;
            text-shadow: 4px 4px 0px #000;
            margin: 10px 0;
            text-align: center;
        }

        /* Container Flexbox: Lado a lado no PC, Empilhado no Mobile */
        .main-container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
            align-items: flex-start;
            flex-wrap: wrap; /* Permite quebrar linha no mobile */
        }

        .panel {
            background: var(--panel-bg);
            border: 6px solid var(--border-color);
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            padding: 20px;
            position: relative;
            box-sizing: border-box;
        }

        /* Larguras responsivas */
        .leaderboard { flex: 2; min-width: 300px; }
        .side-panel { flex: 1; min-width: 300px; }

        .panel-title {
            background: var(--border-color);
            color: white;
            padding: 5px 15px;
            position: absolute;
            top: -15px;
            left: 15px;
            font-size: 1.3rem;
            white-space: nowrap;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: #ddd;
            border: 3px solid var(--border-color);
            padding: 4px 12px;
            font-family: 'VT323';
            cursor: pointer;
            font-size: 1.1rem;
        }

        .tab-btn.active {
            background: var(--button-blue);
            color: white;
        }

        /* Tabelas Responsivas */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 280px; }
        th { border-bottom: 4px solid var(--border-color); text-align: left; padding: 8px; font-size: 1rem; }
        td { padding: 8px; border-bottom: 1px solid #ddd; position: relative; font-size: 1.1rem; }

        .xp-badge { background: var(--gold); padding: 0px 6px; border: 2px solid #b8860b; font-weight: bold; }

        /* Regras Estilo index2 */
        .rule-item {
            margin-bottom: 10px;
            padding: 8px;
            border-left: 5px solid var(--button-blue);
            background: rgba(41, 173, 255, 0.1);
            font-size: 1rem;
        }

        .gain { color: #2e7d32; font-weight: bold; }
        .loss { color: var(--danger); font-weight: bold; }

        .hidden { display: none; }

        /* TOOLTIP Mobile friendly (clique no nome) */
        .player-row .tooltip {
            display: none;
            background: #333;
            color: #fff;
            padding: 5px;
            font-size: 0.8rem;
            border: 2px solid #000;
            margin-top: 5px;
        }
        .player-row:active .tooltip, .player-row:hover .tooltip { display: block; }

        /* MEDIA QUERY PARA CELULAR */
        @media (max-width: 768px) {
            body { overflow-y: auto; } /* Permite scroll vertical no mobile */
            .main-container { flex-direction: column; }
            .leaderboard, .side-panel { width: 100%; flex: none; }
            .panel { min-height: auto; margin-bottom: 20px; }
            h1 { font-size: 2.5rem; }
            .panel-title { font-size: 1.1rem; top: -12px; }
        }
    </style>
</head>
<body>

    <h1>OBMEP QUEST</h1>

    <div class="main-container">
        
        <div class="panel leaderboard">
            <span class="panel-title" id="main-panel-title">RANKING DOS PLAYERS</span>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="changeMode('geral')">GERAL</button>
                <button class="tab-btn" onclick="changeMode('ciclo')">POR CICLO</button>
                <select id="cycle-select" class="hidden" onchange="renderCiclo(this.value)" style="font-family:'VT323';">
                    <option value="1">Ciclo 1</option>
                    <option value="2">Ciclo 2</option>
                </select>
            </div>

            <div id="view-geral" class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>RANK</th>
                            <th>PLAYER</th>
                            <th>XP</th>
                            <th>🏆</th>
                        </tr>
                    </thead>
                    <tbody id="geral-body"></tbody>
                </table>
            </div>

            <div id="view-ciclo" class="hidden table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>PLAYER</th>
                            <th>XP</th>
                            <th>LOG</th>
                        </tr>
                    </thead>
                    <tbody id="ciclo-body"></tbody>
                </table>
            </div>
        </div>

        <div class="panel side-panel">
            <span class="panel-title">LOG DE REGRAS</span>
            
            <div class="rule-item">
                <span class="gain">AVALIAÇÃO PRESENCIAL</span><br>
                10 (+5 XP) | 9-9.9 (+2 XP)
            </div>
            
            <div class="rule-item">
                <span class="gain">TAREFA ONLINE</span><br>
                10 (+3 XP) | 9-9.9 (+1 XP)
            </div>

            <div class="rule-item">
                <span class="gain">PARTICIPAÇÃO</span><br>
                Solução (+3) | Fórum (+1)
            </div>

            <div class="rule-item" style="border-left-color: var(--danger);">
                <span class="loss">PENALIDADES</span><br>
                Celular, Plágio/IA, Bagunça
            </div>
        </div>

    </div>

    <script>
        const alunosNomes = ["Daniel", "João Gabriel", "José Bernardo", "Kaio", "Leonardo", "Lucca", "Luiz", "Marina", "Maurício", "Niccolas", "Renan", "Sofia", "Theo", "Victor Gabriel", "Vitor Cortez"];

        let dados = alunosNomes.map(nome => ({
            nome: nome,
            titulos: 0,
            ciclos: {
                1: { xp: 10, log: "Prova: +5, Online: +3, Fórum: +2" },
                2: { xp: 5, log: "Melhor Solução: +3, Fórum: +2" }
            }
        }));

        function changeMode(mode) {
            const isGeral = mode === 'geral';
            document.getElementById('view-geral').classList.toggle('hidden', !isGeral);
            document.getElementById('view-ciclo').classList.toggle('hidden', isGeral);
            document.getElementById('cycle-select').classList.toggle('hidden', isGeral);
            document.getElementById('main-panel-title').innerText = isGeral ? "RANKING DOS PLAYERS" : "MISSÕES DO CICLO";
            
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.toggle('active', (b.innerText === 'GERAL' && isGeral) || (b.innerText === 'POR CICLO' && !isGeral));
            });

            if(isGeral) renderGeral(); else renderCiclo(document.getElementById('cycle-select').value);
        }

        function renderGeral() {
            const body = document.getElementById('geral-body');
            body.innerHTML = '';
            let sorted = dados.map(a => ({...a, total: a.ciclos[1].xp + a.ciclos[2].xp}))
                             .sort((a,b) => b.total - a.total);
            
            sorted.forEach((a, i) => {
                body.innerHTML += `<tr><td>#${i+1}</td><td>${a.nome}</td><td><span class="xp-badge">${a.total}</span></td><td>${a.titulos}</td></tr>`;
            });
        }

        function renderCiclo(c) {
            const body = document.getElementById('ciclo-body');
            body.innerHTML = '';
            dados.forEach(a => {
                body.innerHTML += `
                    <tr class="player-row">
                        <td>${a.nome}<div class="tooltip">${a.ciclos[c].log}</div></td>
                        <td><strong>${a.ciclos[c].xp}</strong></td>
                        <td style="font-size: 0.7rem; color: #888;">ℹ️</td>
                    </tr>`;
            });
        }

        renderGeral();
    </script>
</body>
</html>
